- text: Watch out when anyone (including you) says he wants to do something big, but
    can't until he raises money.   It usually means the person is more in love with
    the idea of being big big big than with actually doing something useful. For an
    idea to get big big big, it has to be useful. And being useful doesn't need funding.
      If you want to be useful, you can always start now, with only 1 percent of what
    you have in your grand vision. It'll be a humble prototype version of your grand
    vision, but you'll be in the game. You'll be ahead of the rest, because you actually
    started, while others are waiting for the finish line to magically appear at the
    starting line.
  page: Page 17
- text: When you want to learn how to do something yourself, most people won't understand.
    They'll assume the only reason we do anything is to get it done, and doing it
    yourself is not the most efficient way.   But that's forgetting about the joy
    of learning and doing.
  page: Page 49
