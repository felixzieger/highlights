- text: Watch a modern information worker through the glass the next time you walk
    past a coffee shop. All you can see is typing, mouse-wielding and cell-phone use.
    Information work blurs, and sometimes eliminates, the distinction between thought
    and action, and elevates the role of decision-making above both. Frederick Brooks,
    in his 1975 classic, The Mythical Man Month,1 noted that “the programmer, like
    the poet, works only slightly removed from pure thought-stuff.” Today every sort
    of information work is acquiring the pure thought-like characteristics Brooks
    first noticed in programming. In these conditions, separating work into thought
    and action is less useful than it used to be. Work is simply whatever we must
    do to get from one decision to the next.
