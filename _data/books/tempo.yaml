- text: 'During liminal passages, we are caught in the situational emptiness between
    rich narrative contexts, so the only thing we can do is indulge in existential
    musing. The musing can be either pleasurable or painful, and you can engage in
    it in either self-aware or self-indulgent ways. It can be so painful that you
    might be tempted to avoid it by getting drunk, or so addictive that you might
    get trapped for an extended period, possibly the rest of your life, reluctant
    to move on to the next deep story. This is one way to understand narcissism: it
    is falling in love with yourself at a particular liminal passage to such an extent
    that you are unwilling to submit yourself to further transformative experiences.'
  page: Page 94
- text: We’ve identified learning, in the most general sense, as the process of constructing
    a mental model from scratch. This process is open-ended and has no goals beyond
    hardwired biological ones. It is unsupervised, uncertain, unbounded, unstructured,
    and mostly unrewarding. In more familiar terms, there are no teachers, safety
    belts, syllabi, grades or prizes.
  page: Page 94
- text: 'Whether we are self-aware or deluded each of us through introspection continually
    re-examines, prunes, consolidates and compresses our doctrine into a minimal set
    of self-evident and mutually independent beliefs. Introspection as a process is
    uncannily like trash compaction: your head fills up with unrelated, irreducible
    beliefs. It does not matter how thoughtful your doctrine is. The larger it gets,
    the more rigid and constrained your behavior becomes. This is why the word doctrinaire
    is synonymous with rigid. A growing doctrine is a path of increasing entropy.'
  page: Page 110
- text: The sophisticated novel reader or movie-goer gradually loses his ability to
    identify with, and vicariously experience, the patterns of energy and emotion
    experienced by the protagonists of formulaic stories. You can tire of riding the
    same roller coaster repeatedly. The fact that deliberately crafted stories, as
    opposed to real-world events, contain cues that help us anticipate peaks and troughs,
    ends up blunting our responses to them. When individuals and cultures age, storytellers
    must work harder to trigger experiences of the same intensity.
  page: Page 115
- text: 'You typically have to do something in order to provoke a reaction from the
    environment. Such provocation reveals useful information that can drive an enactment
    forward. The classic example of this phenomenon is language acquisition. When
    a child points to a cow and says “doggie,” and is corrected by a parent, a concept
    is learned and a hypothesis is refined. Progress is much faster than with pure
    listening, but at the cost of mistakes made along the way. This creates a bootstrapping
    conundrum: how can you act meaningfully when you don’t know much about the situation,
    and do not have relevant, well-developed mental models? The answer, as we saw
    briefly in Chapter 4, is that you cannot. You must act meaninglessly, or in other
    words, randomly. Unstructured learning behaviors are random to a lesser or greater
    extent depending on the maturity of the active mental models.'
  page: Page 125
- text: 'This element of necessary improvisation makes opportunistic decision patterns
    the most demanding and creative kind. This is one reason William Gibson’s portrayal
    of Wintermute, an artificial intelligence program in his classic cyberpunk novel
    The Neuromancer, is so effective. Wintermute reflectively explains its behavior
    to the human protagonist of the story: “I try to plan, in your sense of the word,
    but that isn’t my basic mode, really. I improvise. It’s my greatest talent. I
    prefer situations to plans, you see… “'
