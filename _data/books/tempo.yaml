- text: Unlike its cousin space, time is a very intimate dimension. The entire world
    can share an instant of time in a way that it cannot share a location in space.
    There is a reason we remember 9/11 first as a date and only then as a place. Rhythms
    in time bind us more closely than patterns in space.
