- text: Today I have a stable pace-setting routine that I use whenever I start cooking.
    I move clean dishes from the dishwasher to the cabinet and move dirty ones from
    the sink to the dishwasher. Remember the metaphor of the child on a swing? This
    is an example of adding a jolt of energy to what you might call the ‘kitchen cycle”
    to lift its emotional state. Dishes in the cabinet are like an energized swing
    at its highest point. Dishes in the sink are like a swing that has slowed to a
