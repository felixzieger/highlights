- text: A mental model is a dynamic, unstable and partially coherent set of beliefs,
    desires and intentions held together by narratives that weave through the current
    realities, possible histories and possible futures of a situation.
  page: Page 53
- text: As in the world of Newton’s laws, steady movement in an enactment is neither
    interesting nor realistic, and as with Newton’s laws, to change momentum, you
    need forces. The forces that act on mental models arise from internal stresses,
    other mental models, and interactions with reality-data (particularly through
    the addition and falsification of beliefs). The analogy between physics and decision-making
    is valuable because it helps us calibrate the complexity of the underlying phenomena.
    Newton’s laws govern relatively simple phenomena such as a swinging pendulum or
    the Moon orbiting the Earth. They also govern extremely complex phenomena such
    as the weather, avalanches and ocean currents. The laws have much greater predictive
    power in the simple cases, but are just as valid for the more complex cases. Real-world
    decision-making phenomena are closer to weather systems in their complexity. Loose
    beliefs, desires and intentions create an atmosphere of drag and friction for
    those that have coalesced into mental models. Broad-strokes rhythms, along with
    the low-level movement of individual beliefs and desires, create the continuously
    changing background. In the foreground, possible worlds and theories of situations
    being created and destroyed cause the larger discontinuous jumps. The rising and
    sinking of mental models in and out of your awareness creates the biggest discontinuities
    of all.
  page: Page 64
- text: If you think of multiple mental models within your mind as conversation partners,
    dialectics give you a way to think about individual, inside-your-head decision-making
    as well (another use of Minsky’s “Society of Mind” metaphor that we encountered
    in Chapter 1). If you include Nature as a potential conversation partner, you
    get to ideas such as Marx’s dialectical materialism, Joseph Schumpeter’s idea
    of creative destruction and Kuhn’s theory of paradigm shifts. The two notions
    of Jihad in Islam (one signifying internal struggles of the mind, and the other
    signifying worldly “holy war”) are both dialectics. Dialectics give rise to theories
    of science, engineering, culture, religion, politics and economics. Processing
    this cartload of philosophical ideas is clearly beyond the scope of this book.
    Fortunately, we will not need to. The main reason you should be aware of these
    ideas is calibration. Do not look for theories of swinging pendulums or moons
    orbiting planets. To understand decision dynamics, you will need to study things
    as complex as the weather, and as subtle as philosophy. While pendulum-level decision-science
    theories, such as game theory, can be useful in understanding very specific situations,
    using them as generic theories of decision-making can lead to a false sense of
    clarity and security.
