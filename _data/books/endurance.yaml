- text: 'The work of packing the sledges continued the next day, and in the afternoon
    Shackleton called all hands together into the center of the circle of tents. His
    face was grave. He explained it was imperative that all weight be reduced to the
    barest minimum. Each man, he said, would be allowed the clothes on his back, plus
    two pairs of mittens, six pairs of socks, two pairs of boots, a sleeping bag,
    a pound of tobacco—and two pounds of personal gear. Speaking with the utmost conviction,
    Shackleton pointed out that no article was of any value when weighed against their
    ultimate survival, and he exhorted them to be ruthless in ridding themselves of
    every unnecessary ounce, regardless of its value. After he had spoken, he reached
    under his parka and took out a gold cigarette case and several gold sovereigns
    and threw them into the snow at his feet. Then he opened the Bible Queen Alexandra
    had given them and ripped out the flyleaf and the page containing the Twenty-third
    Psalm. He also tore out the page from the Book of Job with this verse on it: “Out
    of whose womb came the ice? And the hoary frost of Heaven, who hath gendered it?
    The waters are hid as with a stone. And the face of the deep is frozen.” Then
    he laid the Bible in the snow and walked away.'
  page: Page 84
- text: They were castaways in one of the most savage regions of the world, drifting
    they knew not where, without a hope of rescue, subsisting only so long as Providence
    sent them food to eat. And yet they had adjusted with surprisingly little trouble
    to their new life, and most of them were quite sincerely happy. The adaptability
    of the human creature is such that they actually had to remind themselves on occasion
    of their desperate circumstances.
  page: Page 90
- text: Killing the seal was usually a bloody business. Wild had brought from the
    ship a revolver, a 12-gauge shotgun, and .33-caliber rifle, but ammunition was
    limited. As a result, the men killed the seals by hand whenever possible. This
    involved approaching the animal cautiously, then stunning it across the nose with
    a ski or a broken oar and cutting its jugular vein so that it bled to death. Sometimes
    the blood was collected in a vessel to be fed to the dogs, but most often it was
    allowed to run out into the snow. Another technique was to brain the seal with
    a pickaxe. But the two surgeons discouraged this practice, for it often left the
    brains inedible and they were prized as food because they were believed to be
    high in vitamin content. In the beginning a few of the men, particularly little
    Louis Rickenson, the chief engineer, were squeamish about this seemingly cold-blooded
    method of hunting. But not for long. The will to survive soon dispelled any hesitancy
    to obtain food by any means.
  page: Page 103
- text: 'And so November was drawing to a close. They had been on the ice just a month.
    And for all the trials and discomforts, these weeks of primitive living had been
    peculiarly enriching. The men had been forced to develop a degree of self-reliance
    greater than they had ever imagined possible. After spending four hours sewing
    an elaborate patch on the seat of his only pair of trousers, Macklin wrote one
    day, “What an ingrate I have been for such jobs when done for me at home.” Greenstreet
    felt much the same way after he had devoted several days to scraping and curing
    a piece of sealskin to resole his boots. He paused in the midst of his task to
    write in his diary: “One of the finest days we have ever had . . . a pleasure
    to be alive.” In some ways they had come to know themselves better. In this lonely
    world of ice and emptiness, they had achieved at least a limited kind of contentment.
    They had been tested and found not wanting.'
  page: Page 110
- text: 'The following day was December 31. McNeish wrote: “Hog-many [the Scottish
    feast of New Year’s] & a bitter one too, beings adrift on the ice instead of enjoying
    the pleasures of life like most people. But as the saying is, there must be some
    fools in this world.” James recorded: “New Year’s Eve, the second in the pack
    & in much the same latitude. Few people are having a stranger one. . . .”'
  page: Page 122
- text: “As we sat there, cramped, crowded and wet,” wrote Macklin, “we wondered how
    we were going to face the month ahead of us, which was the . . . very least we
    could hope for before relief.” And this, he admitted, was a “most optimistic”
    expectation, based upon a half-dozen assumptions—the first among them being that
    the Caird would actually get through. On this score, their general feeling, at
    least outwardly, was confident. But how else might they have felt? Any other attitude
    would have been the equivalent of admitting that they were doomed. No matter what
    the odds, a man does not pin his last hope for survival on something and then
    expect that it will fail.
  page: Page 236
- text: It was obvious that the burden of responsibility Shackleton had borne for
    sixteen months had nibbled away somewhat at his enormous self-confidence. He wanted
    to talk and to be assured that he had acted wisely. He confided to Worsley that
    the decision to separate die party had been a desperately difficult one, and he
    abhorred having to make it. But somebody had to go for help, and this was not
    the sort of responsibility which could be delegated to another person. As for
    the journey itself, he seemed strangely doubtful, and he asked Worsley’s opinion
    of their chances. Worsley replied that he was sure that they would make it, but
    it was evident that Shackleton was far from convinced. The truth was that he felt
    rather out of his element. He had proved himself on land. He had demonstrated
    there beyond all doubt his ability to pit his matchless tenacity against the elements—and
    win. But the sea is a different sort of enemy. Unlike the land, where courage
    and the simple will to endure can often see a man through, the struggle against
    the sea is an act of physical combat, and there is no escape. It is a battle against
    a tireless enemy in which man never actually wins; the most that he can hope for
    is not to be defeated. It gave Shackleton a feeling of uneasiness. He now faced
    an adversary so formidable that his own strength was nothing in comparison, and
    he did not enjoy being in a position where boldness and determination count for
    almost nothing, and in which victory is measured only in survival.
  page: Page 264
- text: Two days of good weather had worked their magic, and among the entire crew
    there was a growing feeling of confidence, subtle but unmistakable. In the beginning,
    South Georgia had existed only as a name—infinitely distant and lacking in reality.
    But no more. They were even at this moment less than 250 miles from the nearest
    point on South Georgia. And having already covered 450 miles, the distance that
    remained was at least conceivable. Three days more, or maybe four at the most,
    should see them there, and then it would all be over. And so that peculiar brand
    of anxiety, born of an impossible goal that somehow comes within reach, began
    to infect them. Nothing overt, really, just a sort of added awareness, a little
    more caution and more care to insure that nothing preventable should go wrong
    now.
  page: Page 283
