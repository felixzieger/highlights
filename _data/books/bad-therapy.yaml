- text: Most American generations endured national hardships. But there was no rash
    of suicides among young southerners during the Civil War nor during Reconstruction.
    None among teens during the Great Depression, though they did see suicide among
    the adults of the time. Nor was there a rash of suicide among young adults
    following Pearl Harbor, when so many of them were sent off to war. Not during
    the Cuban Missile Crisis, when the world might actually have blinked out like
    a Zenith TV on the fritz, nor during the endless waves of disillusionment that
    accompanied the Vietnam War. The Boomers who fancy themselves having confronted
    some of the ugliest chapters in American history—segregation, Vietnam, Watergate—are
    usually the first to acknowledge that they could, and did, initiate a positive
    change.
