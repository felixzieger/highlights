- text: 'I asked Kennair how we could be sure that young people weren’t simply more
    “open” about their poor mental health? Kennair’s response was elegant and astonishing:
    being overly prone to talking about your emotional pain is itself a symptom of
    depression. “If you do this”—habitually give voice to your negative thoughts or
    personal problems—“you’re co-ruminating at least. But I believe they are ruminating
    more. And rumination is the major predictor for depression.”'
  page: Page 68
- text: 'Hang around families with young children for an afternoon, and you’ll hear
    parents check that their kids are enjoying their ice cream, excited about school
    the next day, that they had fun at the park. In so many ways, we signal to kids:
    your happiness is the ultimate goal; it’s what we’re all livin’ for. According
    to the best research, we have it all backward. If we wanted our kids to be happy,
    the last thing we would do is to communicate that happiness is the goal. The more
    vigorously you hunt happiness, the more likely you are to be disappointed.'
  page: Page 68
- text: 'A generation ago, kids might have identified with what Cody calls their “strengths”:
    the jock, the popular kid, the math team member, the beauty queen. But today,
    that’s verboten. “Identifying with your strengths now isn’t seen as too cool because
    some people may manipulate you into thinking that you’re privileged because of
    it.” What’s wrong with identifying with your struggles? “Well, I see that they
    don’t try to solve it.” Cody took pains to explain that he wasn’t talking about
    the severely depressed—just the average kid. Once they get the validation from
    other students for their mental health crises, “they don’t break out of that rut,”
    he said.'
