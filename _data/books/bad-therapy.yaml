- text: “Kids today are always under the situation of an observer,” said Peter Gray,
    a professor of psychology at Boston College and author of the classic introductory
    textbook on psychology. “At home, the parents are watching them. At school, they’re
    being observed by teachers. Out of school, they’re in adult-directed activities.
    They have almost no privacy.”
