- text: If you want to improve a kid’s mental health, locking up her smartphone might
    be a start. At a minimum, smartphones take a teen further from the world of in-person
    friends and activity likely to bolster her sense of well-being. They are undoubtedly
    responsible for exacerbating a variety of social contagions, from tic disorders
    to gender dysphoria. But banish the smartphone and fix a generation? I’m not so
    sure. Youth mental health has been in decline, after all, for the last five
