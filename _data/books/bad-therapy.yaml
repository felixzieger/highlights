- text: 'The great Israeli sociologist Eva Illouz notes that the trauma narrative
    is plotted backward—from present adult dissatisfaction to the epiphany of a childhood
    spent in a dysfunctional family. “What is a dysfunctional family? A family where
    one’s needs are not met. And how does one know that one’s needs were not met in
    childhood? Simply by looking at one’s present situation,” Illouz writes. “The
    nature of the tautology is obvious: any present predicament points to a past injury.”'
