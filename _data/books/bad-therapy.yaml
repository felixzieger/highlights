- text: 'The “authoritative parent,” however, is loving and rule based. She attempts
    to direct the child’s activities in a rational manner, encourages a give-and-take
    with her child, but “exerts firm control at points of parent-child divergence.”
    Where her point of view on a household rule ultimately conflicts with that of
    her child, she wins. She maintains high standards for her child’s behavior “and
    does not base her decisions on group consensus or the individual child’s desires.”[19]
    In studies that still manage to chagrin therapists, Baumrind found that authoritative
    parenting styles produced the most successful, independent, self-reliant, and
    best emotionally regulated kids; it also produced the happiest kids—those less
    likely to report suffering from anxiety and depression. This is a remarkably
    sturdy research finding: kids are happiest when raised in a loving environment
    that holds their behavior to high standards, expects them to contribute meaningfully
    to the household, and is willing to punish when behavior falls short. And it flies
    in the face of virtually everything therapists and parenting books now exhort.'
  page: Page 217
