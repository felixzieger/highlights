- text: 'I’m not the only one to have found something fishy in the fact that more
    treatment has not resulted in less depression. A group of academic researchers
    recently noticed the same. They published a peer-reviewed paper titled “More Treatment
    but No Less Depression: The Treatment-Prevalence Paradox.” The authors note
    that treatment for major depression has become much more widely available (and,
    in their view, improved) since the 1980s worldwide. And yet in not a single Western
    country has this treatment made a dent in the incidence of major depressive disorder.
    Many countries saw an increase.'
