- text: 'Ortiz believes acts of independence can help alleviate even unrelated fears.
    Of his method with kids, he has joked, “So you’re scared of the dark? Go to the
    deli and buy me a half a pound of salami.” The child’s feeling of efficacy that
    results from completion of this sort of task, he says, makes kids stronger in
    every sense: braver, less anxious, more willing to try things that are hard, and,
    remarkably, less of a constant burden to their stricken parents. So far, he says,
    the results are promising.'
  page: Page 260
- text: As far as I can tell, the purpose of childhood is to allow kids to take risks—things
    that involve getting all kinds of hurt—and to practice the skills they will need
    as adults while they are still safely under their parents’ roofs. Childhood exists
    to allow kids to hazard an unpredictable friend, lose a ball game, stand up to
    a bully, pick themselves up, offer another kid a hand.
  page: Page 278
