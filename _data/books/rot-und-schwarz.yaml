- text: '»Du mein Gott! Du bist recht schnell entschlossen, Bester!« »Ja, ja! Weil
    ich weiß, was ich will! Der Pfarrer hat das heute auch verspürt. Wir wollen uns
    nichts vormachen: wir sind hier von Liberalen umringt! Alle diese Leinwandhändler
    sind voller Neid auf mich. Darüber bin ich mir ganz klar. Zwei oder drei von ihnen
    sind nahe daran, reiche Leute zu werden. Es soll mir Spaß machen, wenn sie die
    Kinder des Herrn von Rênal mit ihrem Erzieher auf der Stadtpromenade erblicken.
    Das wird ihnen imponieren. Mein Großvater hat uns oft erzählt, daß er in seiner
    Jugend einen Erzieher hatte ... Das kostet mich zwar hundert Taler, aber es ist
    für uns eine notwendige Ausgabe, um standesgemäß aufzutreten.«'
  page: Page 20
- text: »Lieber auf alles das verzichten«, sagte er sich, »als mich so weit erniedrigen,
    daß ich zusammen mit den Dienstboten esse! Mein Vater möchte mich offenbar dazu
    zwingen. Eher sterbe ich! Ich habe fünf Taler und vier Groschen in der Tasche,
    meine Ersparnisse. Damit laufe ich heute nacht fort. In zwei Tagen gelange ich
    auf Seitenwegen, wo ich keinen Gendarm zu fürchten habe, nach Besançon. Dort lasse
    ich mich zu den Soldaten anwerben. Nötigenfalls entwische ich nach der Schweiz.
    Mit der Karriere ist es dann freilich vorbei. Dann nützt all mein Ehrgeiz nichts.
    Lebe wohl, schöner Priesterstand, der einem alle Wege öffnet!« Julians Abscheu
    vor dem gemeinschaftlichen Essen mit Dienstboten lag nicht in seiner Natur. Um
    vorwärtszukommen, hätte er noch viel peinlichere Dinge ertragen. Dieser Widerwille
    rührte aus Rousseaus Bekenntnissen her, dem Buche, nach dem er sich einzig und
    allein ein phantastisches Bild von der Gesellschaft machte. Nur die Bulletins
    der Großen Armee und das Memorial von Sankt Helena ergänzten diese seine Bibel.
    Für diese drei Bücher wäre er in den Tod gegangen. Allen andern mißtraute er.
    Einem Ausspruch des alten Stabsarztes zufolge hielt er die ganze Weltliteratur
    für Lug und Trug, für Machwerke von Narren und Strebern.
  page: Page 28
- text: '»Das war Ihr Gebot! Sehr richtig!« erwiderte Vater Sorel. Seine Rede ward
    noch überlegsamer, und indem er Herrn von Rênal scharf anblickte, fügte er hinzu:
    »Andere Leute zahlen besser.« Das war so recht die geniale Frechheit eines Bauern
    der Freigrafschaft! Der Bürgermeister sah im Augenblick ganz verdutzt aus. Er
    faßte sich jedoch sofort, und nach reichlich zweistündigem Hin- und Hergerede,
    wobei kein unüberlegtes Wort fiel, siegte die Schlauheit des Bauern über die Schlauheit
    des Patriziers, dieweil sie bei diesem nicht Daseinsbedingung war. Julians neue
    Lebensweise ward in einer langen Reihe von Punkten festgelegt. Sein Gehalt solle
    vierhundert Franken im Jahre betragen, zahlbar jeden Ersten des Monats im voraus.
    »Also zahle ich ihm monatlich fünfunddreißig Franken!« erklärte Herr von Rênal.
    »Sagen wir: sechsunddreißig, eine runde Summe.« Und schmeichlerisch fügte der
    Bauer hinzu: »Ein reicher und freigebiger Mann wie der Herr Bürgermeister wird
    sich nicht lumpen lassen!« »Abgemacht!« sagte Rênal. »Aber nun bleibt es dabei!«
    Der Zorn verlieh ihm plötzlich den Ton der Bestimmtheit. Der Bauer merkte, daß
    er nicht weiter gehen durfte. Jetzt gewann wieder Herr von Rênal die Oberhand.
    Er dachte nicht daran, die sechsunddreißig Franken für den ersten Monat dem Alten
    anzuvertrauen, der sie am liebsten auf der Stelle für seinen Sohn eingestrichen
    hätte. Auch fiel Herrn von Rênal ein, daß er seiner Frau etwas Imponierendes über
    seine Verhandlung mit dem Bauern berichten mußte.'
  page: Page 30
- text: Julians Freund, der alte Stabsarzt, war tot. Urplötzlich hörte Julian auf,
    von Napoleon zu reden. Jetzt erklärte er die Absicht, Priester zu werden. Alsbald
    sah man ihn beständig in der Schneidemühle seines Vaters beim Auswendiglernen
    einer lateinischen Bibel, die ihm der Pfarrer geliehen hatte. Verwundert über
    die Fortschritte des jungen Menschen, verbrachte der alte Mann manchen langen
    Abend mit ihm, um ihn in der Theologie zu unterweisen. Julian offenbarte ihm nur
    fromme Regungen. Kein Mensch konnte ahnen, daß dieser bleiche, zarte, mädchenhafte
    Bursche den unerschütterlichen Vorsatz in sich trug, tausendmal sein Leben zu
    riskieren, wenn er nur sein Glück machte. Sein Glück machen! Das hieß zunächst,
    aus Verrières hinauskommen. Er haßte seine Heimat. Alles, was er daselbst sah,
    hemmte sein phantastisches Innenleben. Von klein auf hatte er Augenblicke höchster
    Erregung gehabt. In Wonnen träumte er sich aus, wie er eines Tages die Bekanntschaft
    hübscher Pariserinnen machen werde, nachdem er ihre Aufmerksamkeit durch eine
    außerordentliche Tat auf sich gezogen. Warum sollte er nicht von einer von ihnen
    geliebt werden, wie Bonaparte, noch arm, von der wunderschönen Frau von Beauharnais
    geliebt worden war?
  page: Page 32
- text: 'Der Kirchenbau und die Urteile des Ortsrichters waren die Ursache, daß es
    ihm mit einem Schlage wie Schuppen von den Augen fiel. Diese Erleuchtung machte
    ihn wochenlang toll und durchflammte ihn schließlich mit jener Allgewalt, die
    die erste selbstgefundene Idee in einer leidenschaftlichen Seele erzeugt. Er sagte
    sich: »Als Bonaparte aus dem Dunkel hervortrat, stand Frankreich vor dem Einmarsch
    der fremden Mächte. Das Soldatentum war notwendig und Mode. Heutzutage sieht man
    Priester, die mit vierzig Jahren ein Einkommen von hunderttausend Franken haben.
    Das ist dreimal mehr, als die weltberühmten Divisionsgenerale Napoleons bezogen.
    Die Priester brauchen Helfershelfer. Da ist zum Beispiel dieser Ortsrichter, ein
    heller Kopf und bisher ein Ehrenmann – aber auf seine alten Tage entehrt er sich
    aus Angst vor einem jungen Vikar von dreißig Jahren! Ja, heutzutage muß man Pfaffe
    werden!«'
  page: Page 33
- text: Ohnmächtig und stark blutend blieb er liegen. Zufällig kam Frau Rênal auf
    einem Spaziergang mit Herrn Valenod und dem Landrat ebendahin. Als sie Julian
    am Boden sah, glaubte sie, er sei tot. Das ergriff sie so stark, daß Valenod eifersüchtig
    wurde. Seine Befürchtung war verfrüht. Julian fand Frau von Rênal zwar bildschön,
    aber er haßte sie gerade ob ihrer Schönheit. Denn diese war die erste Klippe,
    die das Schifflein seines Glückes bedrohte. Er sprach möglichst wenig mit ihr,
    um das Feuer zu ersticken, das ihn am ersten Tage verführt hatte, ihr die Hand
    zu küssen.
  page: Page 46
- text: Der Schmerz war ihr Erzieher. Zu stolz, ihr Leid auch nur ihrer Freundin,
    Frau Derville, zu klagen, bildete sie sich ein, alle Männer wären wie der ihre.
    Roheit und brutale Unempfindlichkeit gegen alles, was nicht Geld, Vorrang oder
    Auszeichnung hieß, blinde Wut gegen jedwede andre Meinung, hielt sie für Dinge,
    die zum Manne ebenso unvermeidlich gehören wie Stiefel und Filzhut.
  page: Page 48
- text: In Paris hätten Julians Beziehungen zu Frau von Rênal eine einfache und rasche
    Entwicklung gehabt. In den Großstädten ist die Literatur die Verführerin zur Liebschaft.
    Dem jungen Hauslehrer und seiner scheuen Herrin wäre aus dem oder jenem Roman
    die Erleuchtung gekommen, und selbst Operettencouplets hätten den beiden die Augen
    geöffnet. Romangestalten hätten ihnen die Worte vorgesprochen und ihnen die Wege
    gezeigt. Früher oder später hätte ein solches Vorbild Julian zur Nachahmung gereizt.
    Er wäre diesem Ideale unbedingt gefolgt, wenn auch vielleicht ohne jeden Genuß,
    vielleicht sogar mit Widerstreben.
  page: Page 49
- text: '»Meine Verehrteste, ich finde keine andern Worte als die des hochseligen
    Fürsten von Conde. Als er seiner jungen Gattin seinen Hofstaat vorstellte, sagte
    er: Alle diese Leute sind unsre Domestiken! Ich habe dir die Stelle aus den Denkwürdigkeiten
    des Barons von Besenval einmal vorgelesen. Sie ist eine gute Richtschnur in Standesfragen.
    Alles in unserm Hause, was nicht von Adel ist und Gehalt bekommt, ist Dienstbote.
    Ich werde mit diesem Herrn Julian ein Wörtchen reden und ihm hundert Franken geben.«'
  page: Page 51
- text: »Was soll ich ihnen nur sagen?« fragte er sich unruhig, als er der Damen gedachte.
    Er ahnte nicht, daß er sich in einem Zustande befand, in dem er just für Kleinigkeiten
    Sinn hatte, also für das, was im Leben der Frauen gewöhnlich die Hauptsache ist.
    Oftmals war er Frau Derville und sogar ihrer Freundin unverständlich, und er seinerseits
    begriff häufig nur halb, was ihm die beiden sagten. Das war die folge der Kraftfülle
    und, wenn man das so nennen darf, der Großartigkeit des leidenschaftlichen Innenlebens,
    das die Seele dieses ehrsüchtigen jungen Mannes verwirrte. In diesem Sonderling
    war fast Tag für Tag Sturm. An diesem Abend kam Julian in einer Stimmung in den
    Garten, die ihn befähigte, sich in der Gedankenwelt der beiden hübschen Frauen
    zurechtzufinden.
  page: Page 80
- text: Im Morgengrau des dritten Tages nahm er Abschied von Fouqué und verbrachte
    den ganzen Tag in den Felsenklüften oben im Gebirge. Er fand seine kleine Höhle
    wieder, aber nicht seinen Seelenfrieden. Den hatte ihm Fouqués Angebot geraubt.
    Wie Herkules stand er am Scheidewege – nicht zwischen Laster und Tugend, sondern
    zwischen einem wohlgesicherten Durchschnittsdasein und dem Heldentum seiner Jugendträume.
    »Wirkliche Festigkeit fehlt mir«, gestand er sich in tiefstem Weh über den Zweifel
    an sich selbst. »Ich bin nicht aus dem harten Holze der großen Männer geschnitzt,
    wenn ich fürchte, daß mich ein halbes Dutzend Jahre Broterwerb um die göttliche
    Energie bringt, durch die der Mensch das Außergewöhnliche schafft.«
  page: Page 91
- text: 'Himmelweit entfernt von der Ungebundenheit des Naturmenschen, gehörte Julian
    bereits zu den Sklaven der Überkultur, denen die Liebe nichts ist als eine langweilige,
    konventionelle Sache. Eitel und kleinlich sagte er sich: »Ich bin es mir unbedingt
    schuldig, bei dieser Frau zum Ziele zu kommen. Sollte ich je berühmt werden, und
    es würfe mir jemand diesen armseligen Hauslehrerposten vor, so kann ich andeuten,
    die Liebe hätte mich in diese Stellung geführt.«'
  page: Page 97
- text: Julian besaß bereits so große Virtuosität in der Beredsamkeit, die in Frankreich
    seit 1815 an die Stelle der Tatenlust der napoleonischen Zeit getreten war, daß
    ihn sein eigener Klingklang schließlich selber anödete.
  page: Page 163
- text: »Diesem dreckigen Glück strebst du zu! Du erringst es nur, wenn du dich diesen
    Genossen und ihrer Weltanschauung beugst. Dann ergatterst du unter Umständen einen
    Posten mit 20 000 Franken Gehalt; aber, während du dir den Bauch vollschlägst,
    mußt du es fertigbekommen, einem armen Sträfling das Singen zu verbieten. Du gibst
    Diners von dem Gelde, das du seiner kargen Kost abknappst, und während du tafelst,
    muß er mehr denn sonst leiden ...« »Großer Napoleon«, fuhr er in seinen Gedanken
    fort, »wie herrlich war deine Zeit! Damals kam man durch die Gefahren der Schlachten
    vorwärts; heutzutage, indem man stumm und feig zusieht, wie Unglückliche geknechtet
    werden!«
  page: Page 166
- text: Julian liebte ihre Söhne weit zärtlicher als der eigene Vater, und trotz seiner
    strengen Gerechtigkeit waren sie vernarrt in ihn. Sie fand sich damit ab, ihr
    geliebtes waldumrauschtes Vergy verlassen zu müssen, wenn sie Julians Frau würde.
    Im Geiste sah sie sich in Paris wohnen, mit der Erziehung ihrer Kinder beschäftigt,
    von aller Welt darob bewundert. Die Kinder, sie selbst und Julian, alle waren
    glücklich ... Die moderne Ehe hat sonderbare Begleiterscheinungen, Ist vor der
    Heirat Liebe vorhanden, so stirbt sie sicher in der Langweile des ehelichen Beieinanders.
    Zumal bei Eheleuten, die reich genug sind, um nicht arbeiten zu müssen, stellt
    sich gründlicher Widerwille gegen das geruhsame Eheglück ein. Und nur die phantasielosen
    Frauen gehen an Liebschaften und Liebeleien vorbei, anstatt sich kopfüber in sie
    zu stürzen.
  page: Page 177
- text: Er hatte schwere Arbeit an sich selbst. Zum Beispiel machten ihm seine Augen
    viel zu schaffen. »Man muß sie wohlweislich an frommen Orten zu Boden schlagen.
    Wie dünkelhaft war ich doch in Verrières«, gestand er sich. »Ich glaubte in der
    Welt zu sein, aber dort, das war nur eine Vorstufe. Hier erst bin ich in der Welt,
    so wie ich sie vor mir haben werde, bis ich meine Rolle ausgespielt habe. In der
    Welt sein, heißt von wahren Feinden umgeben sein. In allen Augenblicken heucheln
    zu müssen, ist maßlos schwer. Die Arbeiten des Herkules sind nichts dagegen. Ein
    moderner Herkules war Papst Sixtus der Fünfte, gegen Ende des Cinquecento. Fünfzehn
    Jahre lang hat er vierzig Kardinale getäuscht, die ihn als hochmütigen lebhaften
    jungen Mann gekannt hatten, indem er vor ihnen den Demütigen spielte.«
  page: Page 206
- text: '»Und wenn ich auch vorwärtskomme«, sagte er sich, »so habe ich doch ein ganzes
    Leben in so übler Gesellschaft vor mir. Ich konkurriere mit Vielfraßen, die an
    nichts denken als an die Speckpfannenkuchen, die sie zu Mittag verschlingen werden,
    oder mit Halunken, denen wie dem Abbé Castanède kein Verbrechen zu schwarz ist...
    Diese Leute gelangen zur Macht. Ja, aber um welchen Preis! Der feste Wille eines
    Menschen vermag viel. Das weiß ich. Aber genügt der Wille, um so starken Ekel
    zu überwinden? Die großen Männer der Geschichte hatten es leicht. So schrecklich
    auch die Gefahren waren: sie fanden sie schön. Aber niemand außer mir kennt die
    häßlichen Dinge, die mich umstarren!«'
  page: Page 211
- text: Gegen Mittag nahm Abbé Pirard Abschied von seinen Schülern, nicht ohne eine
    ernste Ansprache an sie zu halten. »Wollt ihr die Ehren der Welt einheimsen«,
    predigte er, »wollt ihr alle sozialen Vorteile, den Genuß, zu herrschen und zu
    gebieten, sich über die Gesetze hinwegzusetzen und gegen jedermann ungestraft
    zu überheben? Wollt ihr das, oder wollt ihr euer Seelenheil? Auch der Beschränkteste
    unter euch ist imstande, klar den Scheideweg zu erkennen ...«
  page: Page 236
- text: 'Nachdem er lange mit den Anwälten des Marquis gearbeitet hatte, fuhr er ab
    nach Paris. Beim Abschiednehmen von ein paar guten Bekannten hatte er die Schwäche,
    zu bekennen, daß er sich während der fünfzehnjährigen Leitung des Seminars genau
    hundertfünfundsiebzig Taler gespart habe. Da umarmten ihn die Freunde unter Tränen.
    Hinterher sagten sie zueinander: »Diese Flunkerei hätte sich der gute Abbé sparen
    können. Sie ist wirklich zu lächerlich.« Die von Geldgier blinden Durchschnittskreaturen
    vermochten nicht zu begreifen, daß Pirard die Kraft zu dem zehnjährigen Kampfe
    gegen die jesuitischen Geheimbündler just aus seiner Ehrlichkeit geschöpft hatte.'
  page: Page 237
- text: 'Man wird dich eines schönen Tages zu Dingen mißbrauchen, die in der Presse
    gebrandmarkt werden. Wenn du am Pranger stehst, werde ich wieder von dir hören.
    Meiner Ansicht nach ist es selbst in materieller Hinsicht besser, in einem anständigen
    Holzgeschäft zweitausend Franken im Jahre zu verdienen, dabei aber sein eigner
    Herr zu bleiben, als viertausend Franken von einer Regierung zu beziehen, und
    wäre es die des Königs Salomo.« In diesen Einreden sah Julian nur die Beschränktheit
    des kleinen Mannes. Ihm aber schien sich endlich der Weg in die große Welt aufzutun.
    Nach Paris zu kommen, das er sich von Intriganten und Heuchlern höherer Art bevölkert
    vorstellte, von Leuten, die ebenso höflich waren wie der Bischof von Besançon
    und jener Kardinal, der ihm in Hohen-Bray begegnet war: dies Glück verscheuchte
    ihm alle Bedenken.'
  page: Page 242
- text: »Was für eine Schande wäre es für mich, wenn ich mich hinauskomplimentieren
    ließe!« sagte er sich. »Die Reue darüber würde mir mein ganzes Leben vergiften.
    Sie wird mir nie schreiben, und Gott weiß, wann ich je wieder in diese Gegend
    komme!« Von diesem Augenblick an war alles Hohe und Hehre aus seinem Herzen gewichen.
    Ein angebetetes Weib dicht neben sich, saß er in demselben Gemache, in dem er
    einst so glücklich war, in tiefdunkler stiller Nacht; er wußte, daß sie seit einer
    Weile weinte; er fühlte am Wogen ihres Busens, daß sie krampfhaft schluchzte,
    und doch wurde er mit einemmal ein kalter, herzloser, lauernder Beobachter, kaum
    anders als im Seminarhofe unter den schlechten Witzen seiner ihm körperlich überlegenen
    Kameraden.
  page: Page 250
- text: '»Du wolltest auf dem Lande leben«, meinte der andre, »ohne am Leben und Treiben
    deiner Nachbarn Interesse zu zeigen, ja ohne ihr Geschwätz anzuhören, das war
    ein Riesenfehler!« »Er soll wieder gutgemacht werden. Schloß Montfleury steht
    zum Verkauf. Wenn''s sein muß, will ich fünfzigtausend Franken dabei fahrenlassen.
    Ich werde froh sein, wenn ich diese Teufelsecke der Niedertracht und Heuchelei
    hinter mir habe. Ich will mir Friedsamkeit und Einsiedlertum dort suchen, wo sie
    einzig und allein in Frankreich gedeihen: im Dachstock eines Hauses von Paris
    mit dem Blick auf die Champs-Elysees.«'
  page: Page 261
- text: Selten verriet sich ein offenbarer Mangel an Rücksicht, aber Julian hatte
    bei Tisch schon zwei oder drei kurze Gespräche zwischen dem Marquis und seiner
    Frau mit angehört, die für den oder jenen Tischgenossen peinlich waren. Dieses
    adelsstolze Ehepaar machte kein Hehl aus seiner aufrichtigen Mißachtung gegen
    jedermann, dessen Vorfahren nicht bereits zum höchsten Hofadel gehört hatten.
    Julian machte die Wahrnehmung, daß das Wort »Kreuzzug« das einzige war, was den
    Ausdruck tiefen Ernstes und echter Hochachtung auf ihre Gesichter lockte. Die
    gewöhnliche Achtung hatte immer einen Anflug von Herablassung.
  page: Page 286
- text: »Das ist der ungeheure Vorteil, den die Abkömmlinge alter Familien vor uns
    Plebejern haben«, sagte sich Julian, als er allein im Garten zurückblieb. »Die
    Geschichte ihrer Vorfahren hebt sie empor über die Gefühlswelt der Alltäglichkeit.
    Überdies brauchen sie nicht immer an ihren Unterhalt zu denken. Und wie kläglich!«
    setzte er bitter hinzu. »Ich bin unwürdig, über jene höhere Weltanschauung zu
    räsonieren. Mein Leben ist nichts als eine Kette von Heucheleien, weil ich keine
    tausend Franken Rente habe, um wenigstens mein täglich Brot gesichert zu sehen.«
  page: Page 344
- text: »Welch ein Unglück für mich«, dachte sie, »daß es heute keinen wirklichen
    Hof gibt wie den der Katharina von Medici oder Ludwigs XIII.! Ich fühle mich den
    größten und kühnsten Dingen der Welt gewachsen. Zu was könnte ich einen Fürsten
    und Helden begeistern, der zu meinen Füßen schmachtete, einen Mann vom Schlage
    Ludwigs XIII. Ich würde ihn in die Vendée führen, und von da sollte er sein Königreich
    wiedererobern. Dann gäbe es keine Verfassung mehr... Und Julian sollte mir zur
    Seite stehen! Was fehlt ihm? Name und Geld. Er würde sich einen Namen machen und
    Reichtum erwerben. Dem Croisenois fehlt nichts, aber er wird sein Lebtag nichts
    weiter sein als ein halb liberaler, halb royalistischer Herzog, ein farbloser
    Mensch, jedwedem Extrem stets fern. Folglich wird er immer und überall die zweite
    Rolle spielen. Welch große Tat ist im Augenblick, wo man sie unternimmt, nicht
    ein Extrem, eine Utopie? Erst wenn sie vollführt ist, erscheint sie dem Durchschnittsmenschen
    überhaupt möglich.
  page: Page 351
- text: »Julian ist ziemlich aufrichtig gegen mich«, sagte sie sich. »In seinem Alter
    und in seiner schlechten Lage, noch dazu, wo ihn solch erstaunlicher Ehrgeiz quält,
    bedarf er einer Freundin. Vielleicht bin ich ihm diese Freundin. Denn von Liebe
    entdecke ich in ihm keine Spur. Bei der Verwegenheit seines Charakters hätte er
    mir seine Liebe längst gezeigt.«
  page: Page 357
- text: »Es freut mich, daß Sie nicht abreisen«, sagte der Marquis, als die geschäftliche
    Besprechung zu Ende war. »Ich habe Sie gern um mich.« Julian ging. Die letzten
    Worte des Marquis bedrückten ihn. »Und ich Schelm will seine Tochter verführen!
    Vielleicht ihre Heirat mit Croisenois vereiteln, die dem Marquis das Glück der
    Zukunft ist! Denn wenn er selber nicht Herzog wird, so will er wenigstens seine
    Tochter im Besitze der Herzogskrone sehen.« Einen Augenblick dachte Julian daran,
    nach dem Languedoc abzureisen, trotz Mathildens Brief, trotz der dem Marquis gegebenen
    Erklärung. Aber bald verflackerte dieser letzte Funke von Pflichtgefühl. »Eigentlich
    bin ich doch ein guter Kerl«, sagte er sich. »Ich, der Plebejer, habe Mitleid
    mit einer hocharistokratischen Familie! Ich, der ich in den Augen des Herzogs
    von Chaulnes ein Domestik bin! Der Marquis ist ein Krösus. Und wie vermehrt er
    sein Riesenvermögen? Wenn er im Schloß munkeln hört, daß anderntags ein Staatsstreich
    stattfindet, verkauft er seine Staatspapiere. Und ich, den eine stiefmütterliche
    Vorsehung in die niedrigste Klasse der Gesellschaft gestellt hat, ich habe ein
    edles Herz, aber keine tausend Franken Zinsen im Jahre. Das heißt, ich bin bettelarm,
    jawohl, buchstäblich bettelarm! Und da sollte ich mir ein Vergnügen versagen,
    das sich mir bietet? Soll vorbeigehen an einem klaren Quell, der meinen Durst
    stillen kann in der Glut der Wüste der Mittelmäßigkeit, durch die ich mich mühselig
    schleppe! Hol mich der Teufel! So dumm bin ich nicht. Jeder für sich in dieser
    Wüste des Egoismus, die man das Leben nennt!«
  page: Page 365
- text: '»Es ist höchste Zeit«, hob Herr von La Mole von neuem an, »daß es in Frankreich
    zwei Parteien gibt, aber nicht nur dem Namen nach, sondern wirklich zwei säuberlich
    geschiedene Parteien. Auf der einen Seite die Zeitungsschreiber, die Wähler, die
    öffentliche Meinung, mit einem Worte: die Jugend und alles, was blaue Wunder von
    ihr erwartet. Während sie sich am Lärm ihrer eigenen hohlen Worte berauscht, haben
    wir den realen Vorteil, das Budget zu verzehren...« Wiederum erfolgte ein Zwischenruf.'
  page: Page 426
- text: An etwas zu denken, das in keiner Beziehung zu Fräulein von La Mole stand,
    war er nicht imstande. Ehedem, bei Frau von Rênal, hatten ihn seine ehrsüchtigen
    Träumereien und kleinen Eitelkeitserfolge dem reinen Zustand der Verliebtheit
    entzogen; Mathilde ließ nichts neben sich aufkommen. Wenn er in die Zukunft schaute,
    sah er immer nur sie. Und allerwegen in dieser Zukunft erblickte er Erfolglosigkeit.
    Er, der in Verrières voller Überhebung und Hochmut gewesen, war der lächerlichsten
    Bescheidenheit verfallen. Noch vor drei Tagen hätte er den spionierenden Pfaffen
    am liebsten ermordet. Jetzt in Straßburg hätte er jedem Kinde recht gegeben, das
    in Streit mit ihm geraten wäre. Wenn er an die Widersacher und Feinde zurückdachte,
    die er im Laufe seines Lebens gehabt hatte, war es ihm, als hätte er – Julian –
    immer unrecht gehabt. An diesem Wandel seiner Selbstbeurteilung war einzig und
    allein der Umstand schuld, daß seine zügellose Einbildungskraft, die ihm bisher
    glänzende Zukunftsbilder vorgegaukelt hatte, mit einem Male zu seiner unversöhnlichen
    Feindin geworden war.
  page: Page 439
- text: '»Sie sehen aus wie ein Trappist. Sie übertreiben den Grundsatz von der Würde,
    den ich Ihnen in London doziert habe. Eine trübsinnige Miene ist gegen den guten
    Ton. Man muß gelangweilt aussehen. Wenn man traurig aussieht, zeigt man damit,
    daß einem etwas fehlt, daß einem irgend etwas mißglückt ist. Das heißt: man zeigt
    sich inferior. Sehen Sie hingegen gelangweilt aus, so ist jeder, der vergeblich
    sucht, Sie für sich einzunehmen, der Inferiore. Begreifen Sie, wie stark Geringschätzung
    imponiert!«'
  page: Page 440
- text: Der Gegensatz zwischen der zur Schau getragenen Oberflächlichkeit von Julians
    mündlichen Äußerungen und der wunderbaren, geradezu apokalyptischen Tiefe seiner
    Briefe war es, der Eindruck auf Frau von Fervaques machte. Besonders gefiel ihr
    die Länge der Sätze. »Das ist etwas ganz andres als der sprunghafte Stil, den
    dieser unmoralische Mensch, der Voltaire, in die Mode gebracht hat!« dachte sie.
  page: Page 459
- text: Von Stund an war ihre Liebe zu Julian, ihr ganzes Gefühlsleben durchzittert
    von etwas Vagem, Bangem, Grauenhaftem. Die Leidenschaft, deren eine inmitten der
    Überkultur einer Weltstadt groß gewordene kühle Seele überhaupt fähig ist, hatte
    ihren Höhepunkt erreicht.
  page: Page 495
- text: 'Erst nachdem dieser Brief abgegangen war, kam Julian einigermaßen zur Besinnung.
    Jetzt fühlte er sich grenzenlos unglücklich. Jene großen Worte: In acht Wochen
    bin ich tot! rissen ihm seine ehrgeizigen Hoffnungen mit Stumpf und Stiel aus
    dem Herzen. Der Tod an und für sich war ihm nichts Schreckliches. Sein ganzes
    Leben war ein Gang nach Golgatha gewesen, und nie hatte er im einzelnen Leid das
    Endziel des Lebens vergessen.'
  page: Page 504
- text: Als die beiden fort waren, versank Julian in schmerzliche tränenlose Grübelei.
    Alles erschien ihm trüb und trostlos. Es war ihm zumute, als höre sein Herz auf
    zu klopfen. Das war das grausamste Erlebnis, das ihm seit seiner Freveltat widerfuhr.
    Jetzt sah er den Tod vor sich in aller seiner Häßlichkeit. Alle seine Illusionen
    von Seelengröße und Heldentum waren zerstoben wie Wolken vor dem Sturm. Diese
    qualvolle Stimmung währte mehrere Stunden. Gegen solche Seelenvergiftung gibt
    es physische Heilmittel, zum Beispiel Champagner. Aber Julian hielt es für feig
    und verächtlich, seine Zuflucht dazu zu nehmen.
  page: Page 510
- text: 'Es gibt kein natürliches Recht. Das ist veralteter Blödsinn, albernes Gerede
    von Staatsanwälten, deren Vorfahren selber Gauner waren. Es gibt nur ein Recht:
    die Macht, die diese oder jene Handlung unter Strafandrohung verbietet. Natürlich
    ist nichts als die Kraft des Löwen oder das Bedürfnis, das der verspürt, der Hunger
    hat oder friert. Die Leute, die man zu ehren pflegt, sind nichts weiter als Halunken,
    die das Glück gehabt haben, nicht in flagranti ertappt zu werden.'
  page: Page 553
- text: Ich sitze einsam und verlassen in meiner Zelle. Aber ich bin nicht einsam
    über die Erde gewandelt. In mir lebte und webte die mächtige Idee der Pflicht.
    Die Pflicht, die ich mir selber gesetzt, mit Recht oder mit Unrecht, war mir der
    feste Stamm eines Baumes, an den ich mich stützte im Sturm. Ich habe geschwankt.
    Wind und Wetter haben mich geschüttelt. Ich war ja nur ein Mensch. Aber ich habe
    mich nicht zu Boden werfen lassen!
  page: Page 555
- text: Außer in den Augenblicken, da ihn Mathildens Gegenwart ablenkte, lebte Julian
    gänzlich seiner Liebe. Jede große und ungeheuchelte Leidenschaft hat seltsame
    Wirkungen. So kam es, daß Frau von Rênal die Sorglosigkeit und friedsame Heiterkeit
    ihres Geliebten allmählich teilte. »Weißt du«, sagte Julian zu ihr, »damals auf
    unsern gemeinsamen Spaziergängen in den Wäldern von Vergy, da hätte ich so glücklich
    sein müssen wie jetzt. Aber ein ungestümer Ehrgeiz entführte meine Seele gewaltsam
    in ein Traumland. Statt deinen holden Leib, der meinen Lippen so nahe war, an
    mein Herz zu drücken, ließ ich mir die Gegenwart durch Gedanken an die Zukunft
    rauben. Ich malte mir tausend Kämpfe aus, die ich bestehen zu müssen wähnte, ehe
    sich mir ein ungeheures Glück erschlösse... Genug! Ich wäre gestorben, ohne das
    echte Glück zu erfahren, wenn du nicht zu mir in mein Gefängnis gekommen wärst!«
  page: Page 559
- text: »Wer weiß«, sagte er zu Fouqué, »ob wir nach dem Tode nicht doch Empfindungen
    haben. Ich möchte gern in der kleinen Grotte ruhen – ja, ruhen ist das rechte
    Wort dafür – hoch in den Bergen über Verrières. Ich habe dir wohl erzählt, daß
    ich dort in der Grotte mehrmals die Nacht verbracht habe. Meine Blicke schweiften
    weithin über die reichen Gefilde Frankreichs, während mir der Ehrgeiz die Seele
    durchloderte. Der Ehrgeiz, das war damals meine Leidenschaft!
  page: Page 561
