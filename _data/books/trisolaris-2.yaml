- text: '»Verstehen Sie nicht? Ich habe meine tiefsten Gefühle einer Illusion geschenkt!«
    »Glauben Sie denn, dass das Objekt der Liebe bei anderen Menschen tatsächlich
    existiert?« »Ist das eine Frage?« »Sicher. Für die meisten Menschen existiert
    das, was sie lieben, nur in ihrer Fantasie. Das Objekt ihrer Liebe ist nicht der
    Mann oder die Frau aus der realen Welt, sondern was er oder sie in ihrer Vorstellung
    ist. Die echte Person ist nur eine Schablone für die Erschaffung eines Traummanns
    oder einer Traumfrau. Irgendwann entdeckt man dann den Unterschied zwischen der
    Schablone und dem Traumbild. Wenn man sich mit diesem Unterschied anfreunden kann,
    bleibt man zusammen, wenn nicht, trennt man sich. So einfach ist das. Sie unterscheiden
    sich von der Mehrheit der Leute nur in einem Punkt: Sie kommen ohne die Schablone
    aus.« »Ich bin also nicht krank?« »Nur insofern, wie es Ihre Freundin formuliert
    hat: Sie haben eine Gabe für Literatur. Wenn Sie das eine Krankheit nennen wollen,
    meinetwegen.«'
  page: Page 110
- text: 'Mit dem geschulten Blick des Politikers identifizierte Tyler ihn sofort als
    Angehörigen der armseligsten sozialen Schicht, deren Armut eher geistiger als
    materieller Natur war, als einen dieser kleinkarierten Spießer, wie Gogol sie
    in seinen Romanen so treffend karikiert hatte: Kleinbürger, die trotz ihrer erbärmlichen
    gesellschaftlichen Stellung um ihr Ansehen besorgt waren und ihr ganzes Leben
    mit der peinlich genauen und pünktlichen Verrichtung trivialer Dinge verbrachten.
    Sie scheuten jede Kreativität und waren stets bemüht, bloß keine Fehler zu machen.
    Dabei fürchteten sie so sehr, unangenehm aufzufallen, dass sie nicht einmal einen
    Blick nach oben durch die gläserne Decke zu den höheren sozialen Schichten riskierten.
    Tyler hatte für diesen Menschenschlag nur Verachtung übrig. Man konnte gut und
    gerne auf sie verzichten, und der Gedanke, dass sie die Mehrheit der Weltbevölkerung
    ausmachten, die er retten sollte, verursachte ihm Übelkeit.'
  page: Page 234
- text: 'Angenommen, im Universum gäbe es viele große Zivilisationen, womöglich so
    viele wie sichtbare Sterne. Unzählige Zivilisationen also, die zusammengenommen
    die kosmische Gesellschaft bilden. Kosmosoziologie wäre dann die Wissenschaft
    von der Natur dieser universalen Gesellschaft. Auf diese Weise könntest du deine
    beiden Fächer miteinander verbinden. Im Gegensatz zur Humansoziologie liefert
    die Kosmosoziologie mathematisch viel genauere Ergebnisse. Überlege nur: Alle
    Elemente von Chaos und Beliebigkeit in der komplexen Struktur der Zivilisationen
    des Universums werden durch die enorme Distanz gefiltert, sodass die Zivilisationen
    von uns aus betrachtet über Parameter verfügen, die sich relativ leicht mathematisch
    erfassen lassen. Damit erhältst du ein rationales Ergebnis und kannst zunächst
    wie in der euklidischen Geometrie einige einfache, offensichtliche Axiome aufstellen
    und auf der Grundlage dieser Axiome eine ganze Theorie etablieren. Erstens: Überleben
    ist das oberste Gebot jeder Zivilisation. Zweitens: Zivilisationen wachsen und
    dehnen sich ununterbrochen aus, aber die im Kosmos verfügbare Materie bleibt konstant.
    Ich habe darüber schon mein ganzes Leben nachgedacht, aber mit niemandem darüber
    geredet. Ich weiß auch nicht, warum ich jetzt darauf komme … Aber das ist noch
    nicht alles. Damit du aus diesen beiden Axiomen eine grundlegende Vorstellung
    von Kosmosoziologie entwickeln kannst, musst du nämlich noch zwei weitere wichtige
    Konzepte mit einbeziehen: Zweifelsketten und technologische Explosion.'
  page: Page 274
- text: Die Zeit lässt sich nicht aufhalten. Wie eine scharfe Klinge schneidet sie
    durch Hart und Weich und drängt in aller Stille unerbittlich voran. Nichts kann
    sie aus der Ruhe bringen, doch sie selbst verändert alles.
  page: Page 378
- text: Eines Tages vielleicht wird die Menschheit oder jemand anders die Gesetze
    der Natur so gründlich erforscht haben, dass sie nicht nur ihre eigene Realität,
    sondern gleich das gesamte Universum verändern können. Diese Leute werden jedes
    Sternensystem beliebig in eine andere Form bringen können, wie Kuchenteig.
  page: Page 515
- text: Von jeder dieser Kabinen aus konnte die Natürliche Selektion gesteuert und
    kontrolliert werden, daher bildete, zumindest aus der Perspektive der Informatik,
    jede Kabine die Gesamtheit der Natürliche Selektion ab. Die Natürliche Selektion
    war selbst wie eine Holografie. Das Schiff war ein Samen aus Metall, der alle
    Informationen der Menschheit transportierte. Er keimte irgendwo im Universum und
    konnte sich zu einer ganzen Zivilisation auswachsen. Das Teil enthielt das Ganze,
    also konnte die ganze menschliche Zivilisation holografisch sein.
  page: Page 543
- text: 'Und jetzt stellen wir einmal zwei Axiome für die kosmische Gesellschaft auf.
    Erstens: Überleben ist das erste Gebot jeder Zivilisation. Zweitens: Zivilisationen
    wachsen und dehnen sich ununterbrochen aus, aber die im Kosmos verfügbare Materie
    bleibt konstant.«'
  page: Page 601
- text: »So düster wie das Universum nun einmal ist.« Luo Lis Hand fuhr durch die
    Dunkelheit, als streichelte sie über Samt. »Das Universum ist ein dunkler Wald.
    Jede Zivilisation ist ein bewaffneter Jäger, der wie ein Geist zwischen den Bäumen
    umherstreift, vorsichtig störende Zweige aus dem Weg schiebt und versucht, geräuschlos
    aufzutreten und so leise wie möglich zu atmen. Der Jäger muss vorsichtig sein,
    denn überall im Wald lauern andere Jäger wie er. Stößt er auf anderes Leben, egal
    ob es sich dabei um einen anderen Jäger, einen Engel oder einen Teufel, ein neugeborenes
    Baby oder einen alten Tattergreis, eine Fee oder einen Waldgeist handelt, bleibt
    ihm nichts anderes übrig, als es auszuschalten. In diesem Wald sind die Hölle
    die anderen Lebewesen. Es herrscht das ungeschriebene Gesetz, dass jedes Leben,
    das sich einem anderen offenbart, umgehend eliminiert werden muss. Das ist das
    Bild der kosmischen Zivilisationen. Das erklärt das Fermi-Paradox.«
  page: Page 607
