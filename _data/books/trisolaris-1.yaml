- text: Die Menschen winkten mit erhobenen Armen dem Himmel zu, so weit das Auge reichte,
    ein Meer aus erhobenen Armen. Die Raumschiffflotte beschleunigte. Erhaben zog
    sie über den blauen Himmel, glitt vorbei an der Spitze des gerade aufgegangenen
    Mondes und warf azurblaue Aureolen auf seine Gebirge und Ebenen. Der Jubelchor
    verklang. Die Trisolarier sahen schweigend ihrer Hoffnung hinterher, die langsam
    immer tiefer im All verschwand. Sie würden den Ausgang der Expedition nicht mehr
    miterleben. Aber vier-, fünfhundert Jahre später, wenn ihre Ururenkel siegreiche
    Nachrichten aus der neuen Welt empfingen, würde ein neues Leben für die Trisolaris-Zivilisation
    anbrechen.
  page: Page 336
- text: »Was macht die Umweltzweigstelle, die du da leitest, eigentlich? Ihr habt
    den Auftrag, euch Umweltprobleme zunutze zu machen und selbst welche zu verursachen,
    um dadurch die Bevölkerung gegen die Wissenschaft und die moderne Industrie aufzubringen.
    Aber was machst du? Du benutzt das technische Können und die Prognosen des Herrn,
    um die Ruhmeslorbeeren selbst zu ernten.« »Hab ich etwas davon, wenn ich berühmt
    bin? In meinen Augen ist die Menschheit nur noch ein Müllhaufen. Was kümmert mich
    da mein Ruf? Aber wie sollte ich wohl die Gedanken der Menschen manipulieren,
    wenn ich keinen Einfluss auf sie habe?«
  page: Page 339
- text: '»Ich bin Rafael, aus Israel. Vor drei Jahren starb mein vierzehnjähriger
    Sohn bei einem Autounfall. Ich spendete seine Nieren einem palästinensischen Mädchen,
    das an Urämie mit Harnvergiftung litt. So wollte ich meinem Wunsch, dass beide
    Völker, Israelis und Palästinenser, in Frieden miteinander auskommen, Ausdruck
    verleihen. Ich würde für diesen Traum mein Leben geben. Viele Israelis und Palästinenser
    bemühen sich genauso wie ich aufrichtig darum, aber es hat keinen Zweck. Unsere
    Länder versinken immer tiefer in einem Sumpf gegenseitigen Hasses. Das hat mich
    in meinem Glauben an die Menschheit resignieren lassen, und deshalb bin ich Mitglied
    der Organisation geworden. Ich bin von einem Pazifisten zu einem Extremisten geworden.
    Ich habe der Organisation große Geldsummen gespendet und wurde vielleicht deswegen
    zu einem Kernmitglied der Adventisten. Glaubt mir, die Adventisten haben noch
    eigene, geheime Leitlinien. Sie lauten: Der Mensch ist eine bösartige Spezies,
    die der Erde himmelschreiende Verbrechen angetan hat und bestraft werden muss.
    Das eigentliche Ziel der Adventisten ist, den Herrn zu bitten, dem Menschen diese
    heilige Strafe aufzuerlegen: die Auslöschung der gesamten Menschheit.«'
  page: Page 345
- text: »Weißt du, warum ich wirklich hierhergekommen bin?«, fragte Evans. »Weil die
    ersten zarten Triebe des Omnikommunismus bereits im alten China sprossen.« »Meinst
    du den Buddhismus?« »Genau. Das Christentum achtet nur den Menschen. Obwohl Noah
    von allen Tierarten ein Pärchen mit in seine Arche nahm, war nie die Rede davon,
    dass das Leben der Tiere den gleichen Stellenwert wie das der Menschen besäße.
    Der Buddhismus aber verspricht allen Lebewesen, Tieren, Menschen und Geistern,
    Erlösung. Deswegen bin ich nach Asien gekommen, aber … Ich sehe jetzt, dass es
    hier auch nicht anders zugeht.«
  page: Page 420
- text: Das Erschütterndste an der Erde-Trisolaris-Organisation war, dass so viele
    Menschen ihren Glauben an die menschliche Zivilisation restlos verloren hatten,
    die eigene Art hassten und mit Freuden Verrat an ihr begingen. Und dass vielen
    die Vernichtung der menschlichen Spezies, eingeschlossen der eigenen Person, der
    eigenen Enkelkinder, als das höchste Ideal galt. Die Trisolaris-Rebellen waren
    eine Organisation adliger Geister. Ihre Mitglieder rekrutierten sich hauptsächlich
    aus der oberen Intellektuellenschicht, und ein ansehnlicher Teil gehörte zur Elite
    aus Politik und Wirtschaft.
  page: Page 426
