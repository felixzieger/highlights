- text: Somerset Maugham once wrote that in each shave lies a philosophy. I couldn’t
    agree more. No matter how mundane some action might appear, keep at it long enough
    and it becomes a contemplative, even meditative act. As a writer, then, and as
    a runner, I don’t find that writing and publishing a book of my own personal thoughts
    about running makes me stray too far off my usual path. Perhaps I’m just too painstaking
    a type of person, but I can’t grasp much of anything without putting down my thoughts
    in writing, so I had to actually get my hands working and write these words. Otherwise,
    I’d never know what running means to me.
  page: Page 3
- text: 'I’m often asked what I think about as I run. Usually the people who ask this
    have never run long distances themselves. I always ponder the question. What exactly
    do I think about when I’m running? I don’t have a clue. On cold days I guess I
    think a little about how cold it is. And about the heat on hot days. When I’m
    sad I think a little about sadness. When I’m happy I think a little about happiness.
    As I mentioned before, random memories come to me too. And occasionally, hardly
    ever, really, I get an idea to use in a novel. But really as I run, I don’t think
    much of anything worth mentioning. I just run. I run in a void. Or maybe I should
    put it the other way: I run in order to acquire a void. But as you might expect,
    an occasional thought will slip into this void. People’s minds can’t be a complete
    blank. Human beings’ emotions are not strong or consistent enough to sustain a
    vacuum. What I mean is, the kinds of thoughts and ideas that invade my emotions
    as I run remain subordinate to that void. Lacking content, they are just random
    thoughts that gather around that central void.'
  page: Page 14
- text: My only strength has always been the fact that I work hard and can take a
    lot physically. I’m more a workhorse than a racehorse.
  page: Page 20
- text: To start the bar I’d borrowed as much as I could from every place that would
    lend me money, and I’d almost repaid it all. Things were settling down. Up till
    then, it had been a question of sheer survival, of keeping my head above water,
    and I didn’t have room to think of anything else. I felt like I’d reached the
    top of some steep staircase and come out to a fairly open place and was confident
    that because I’d reached it safely, I could handle any future problems that might
    crop up and I’d survive. I took a deep breath, slowly gazed around me, glanced
    back at the steps I’d taken here, and began to contemplate the next stage.
  page: Page 20
- text: Most people I knew were flat out against my decision, or else had grave doubts
    about it. “Your business is doing fine now,” they said. “Why not just let someone
    else run it for a time while you go and write your novels?” From the world’s viewpoint
    this makes perfect sense. And most people probably didn’t think I’d make it as
    a professional writer. But I couldn’t follow their advice. I’m the kind of person
    who has to totally commit to whatever I do. I just couldn’t do something clever
    like writing a novel while someone else ran the business. I had to give it everything
    I had. If I failed, I could accept that. But I knew that if I did things halfheartedly
    and they didn’t work out, I’d always have regrets.
  page: Page 24
- text: After I closed the bar and began my life as a novelist, the first thing we—and
    by we I mean my wife and I—did was completely revamp our lifestyle. We decided
    we’d go to bed soon after it got dark, and wake up with the sun. To our minds
    this was natural, the kind of life respectable people lived. We’d closed the club,
    so we also decided that from now on we’d meet with only the people we wanted to
    see and, as much as possible, get by not seeing those we didn’t. We felt that,
    for a time at least, we could allow ourselves this modest indulgence.
  page: Page 27
- text: Once, I interviewed the Olympic runner Toshihiko Seko, just after he retired
    from running and became manager of the S&B company team. I asked him, “Does a
    runner at your level ever feel like you’d rather not run today, like you don’t
    want to run and would rather just sleep in?” He stared at me and then, in a voice
    that made it abundantly clear how stupid he thought the question was, replied,
    “Of course. All the time!”
  page: Page 34
- text: Muscles are like work animals that are quick on the uptake. If you carefully
    increase the load, step by step, they learn to take it. As long as you explain
    your expectations to them by actually showing them examples of the amount of work
    they have to endure, your muscles will comply and gradually get stronger.
  page: Page 51
- text: If I used being busy as an excuse not to run, I’d never run again. I have
    only a few reasons to keep on running, and a truckload of them to quit. All I
    can do is keep those few reasons nicely polished.
  page: Page 52
- text: Most of what I know about writing I’ve learned through running every day.
    These are practical, physical lessons. How much can I push myself? How much rest
    is appropriate—and how much is too much? How far can I take something and still
    keep it decent and consistent? When does it become narrow-minded and inflexible?
    How much should I be aware of the world outside, and how much should I focus on
    my inner world? To what extent should I be confident in my abilities, and when
    should I start doubting myself? I know that if I hadn’t become a long-distance
    runner when I became a novelist, my work would have been vastly different. How
    different? Hard to say. But something would have definitely been different.
  page: Page 58
- text: 'People sometimes sneer at those who run every day, claiming they’ll go to
    any length to live longer. But I don’t think that’s the reason most people run.
    Most runners run not because they want to live longer, but because they want to
    live life to the fullest. If you’re going to while away the years, it’s far better
    to live them with clear goals and fully alive than in a fog, and I believe running
    helps you do that. Exerting yourself to the fullest within your individual limits:
    that’s the essence of running, and a metaphor for life—and for me, for writing
    as well. I believe many runners would agree.'
  page: Page 59
- text: At certain points in our lives, when we really need a clear-cut solution,
    the person who knocks at our door is, more likely than not, a messenger bearing
    bad news. It isn’t always the case, but from experience I’d say the gloomy reports
    far outnumber the others. The messenger touches his hand to his cap and looks
    apologetic, but that does nothing to improve the contents of the message. It isn’t
    the messenger’s fault. No good to blame him, no good to grab him by the collar
    and shake him. The messenger is just conscientiously doing the job his boss assigned
    him. And this boss? That would be none other than our old friend Reality.
  page: Page 101
- text: Of course it was painful, and there were times when, emotionally, I just wanted
    to chuck it all. But pain seems to be a precondition for this kind of sport. If
    pain weren’t involved, who in the world would ever go to the trouble of taking
    part in sports like the triathlon or the marathon, which demand such an investment
    of time and energy? It’s precisely because of the pain, precisely because we want
    to overcome that pain, that we can get the feeling, through this process, of really
    being alive—or at least a partial sense of it. Your quality of experience is based
    not on standards such as time or ranking, but on finally awakening to an awareness
    of the fluidity within action itself. If things go well, that is.
  page: Page 118
